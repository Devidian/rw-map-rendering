services:
  rw-map-rendering:
    build: .
    container_name: rw-map-rendering
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      MAP_ROOT_DIR: ${MAP_ROOT_DIR:-/appdata/rw-map-rendering/tiles}
      POLL_INTERVAL_MS: ${POLL_INTERVAL_MS:-15000}
      RENDER_SERVERS_JSON: ${RENDER_SERVERS_JSON:-[]}
      RSYNC_TARGET: ${RSYNC_TARGET:-}
      RSYNC_SSH_KEY_FILE: ${RSYNC_SSH_KEY_FILE:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ${MAP_ROOT_DIR:-/appdata/rw-map-rendering/tiles}:${MAP_ROOT_DIR:-/appdata/rw-map-rendering/tiles}
